<svg viewBox="0 0 940 640" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,Segoe UI,sans-serif">
  <title>Схема radar3d: конвейер данных и рантайм с единой конфиг-шиной DataContext и Observer</title>
  <desc>Сверху конвейер: входы ЛЧМ и АМ сходятся в WaveformToCube, куб 16×16×16, окно W16/шаг8, reduce_kz, квадраты. Снизу рантайм: ProjectConfig и продюсеры Windows/Linux публикуют в шину DataContext, которая уведомляет наблюдателей — Dear PyGui, plotly, matplotlib.</desc>

  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#4fb8d6"/>
    </marker>
    <marker id="ahg" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#48d59a"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="940" height="640" rx="16" fill="#0b1620"/>

  <!-- ZONE A: PIPELINE -->
  <text x="28" y="34" fill="#8fb6c8" font-size="13" font-weight="700" letter-spacing="1">КОНВЕЙЕР ДАННЫХ · фронт-энд ветвится, низ общий</text>

  <rect x="28" y="58" width="150" height="46" rx="9" fill="#132a24" stroke="#3f9a6e"/>
  <text x="103" y="80" fill="#d7f2e4" font-size="12.5" text-anchor="middle" font-weight="600">ЛЧМ</text>
  <text x="103" y="96" fill="#7fc7a3" font-size="11" text-anchor="middle">16×16×10000</text>

  <rect x="28" y="118" width="150" height="46" rx="9" fill="#132a24" stroke="#3f9a6e"/>
  <text x="103" y="140" fill="#d7f2e4" font-size="12.5" text-anchor="middle" font-weight="600">АМ</text>
  <text x="103" y="156" fill="#7fc7a3" font-size="11" text-anchor="middle">16×16×16 · шаг 8</text>

  <path d="M178,81 C205,81 210,111 232,111" stroke="#4fb8d6" fill="none" marker-end="url(#ah)"/>
  <path d="M178,141 C205,141 210,121 232,121" stroke="#4fb8d6" fill="none" marker-end="url(#ah)"/>

  <rect x="234" y="90" width="140" height="46" rx="9" fill="#12222e" stroke="#2a6b82"/>
  <text x="304" y="110" fill="#eaf6fc" font-size="12" text-anchor="middle" font-weight="600">WaveformToCube</text>
  <text x="304" y="126" fill="#7fb0c4" font-size="10.5" text-anchor="middle">Strategy · дечирп / 3D-FFT</text>

  <path d="M374,113 L406,113" stroke="#4fb8d6" fill="none" marker-end="url(#ah)"/>
  <rect x="408" y="90" width="112" height="46" rx="9" fill="#12222e" stroke="#2a6b82"/>
  <text x="464" y="112" fill="#eaf6fc" font-size="12" text-anchor="middle" font-weight="600">куб</text>
  <text x="464" y="128" fill="#7fb0c4" font-size="11" text-anchor="middle">16×16×16</text>

  <path d="M520,113 L552,113" stroke="#4fb8d6" fill="none" marker-end="url(#ah)"/>
  <rect x="554" y="90" width="118" height="46" rx="9" fill="#12222e" stroke="#2a6b82"/>
  <text x="613" y="112" fill="#eaf6fc" font-size="12" text-anchor="middle" font-weight="600">окно по Z</text>
  <text x="613" y="128" fill="#7fb0c4" font-size="11" text-anchor="middle">W=16 · шаг 8</text>

  <path d="M672,113 L704,113" stroke="#4fb8d6" fill="none" marker-end="url(#ah)"/>
  <rect x="706" y="90" width="104" height="46" rx="9" fill="#12222e" stroke="#2a6b82"/>
  <text x="758" y="112" fill="#eaf6fc" font-size="12" text-anchor="middle" font-weight="600">reduce_kz</text>
  <text x="758" y="128" fill="#7fb0c4" font-size="10.5" text-anchor="middle">max/sum</text>

  <path d="M810,113 L842,113" stroke="#4fb8d6" fill="none" marker-end="url(#ah)"/>
  <rect x="812" y="88" width="100" height="50" rx="9" fill="#0e2b33" stroke="#00d0e0"/>
  <text x="862" y="110" fill="#bff4fb" font-size="12" text-anchor="middle" font-weight="700">квадраты</text>
  <text x="862" y="126" fill="#7fd6e6" font-size="11" text-anchor="middle">16×16</text>

  <line x1="28" y1="196" x2="912" y2="196" stroke="#1e3540" stroke-dasharray="4 5"/>

  <!-- ZONE B: RUNTIME + BUS -->
  <text x="28" y="226" fill="#8fb6c8" font-size="13" font-weight="700" letter-spacing="1">РАНТАЙМ · ЕДИНАЯ ШИНА · OBSERVER</text>

  <rect x="378" y="252" width="184" height="46" rx="9" fill="#2c2411" stroke="#c79a2e"/>
  <text x="470" y="273" fill="#f5e3b0" font-size="12.5" text-anchor="middle" font-weight="600">ProjectConfig</text>
  <text x="470" y="289" fill="#cdb573" font-size="10.5" text-anchor="middle">YAML · единые настройки</text>
  <path d="M470,298 L470,360" stroke="#4fb8d6" fill="none" marker-end="url(#ah)"/>
  <text x="486" y="332" fill="#8fb6c8" font-size="10.5">грузим</text>

  <rect x="300" y="362" width="340" height="66" rx="12" fill="#0e3b47" stroke="#00d0e0" stroke-width="2"/>
  <text x="470" y="390" fill="#bff4fb" font-size="14" text-anchor="middle" font-weight="700">DataContext — общая шина</text>
  <text x="470" y="410" fill="#7fd6e6" font-size="11" text-anchor="middle">всё чтение/запись/обмен · Blackboard · Subject</text>

  <rect x="28" y="352" width="210" height="42" rx="9" fill="#132a24" stroke="#3f9a6e"/>
  <text x="133" y="371" fill="#d7f2e4" font-size="11.5" text-anchor="middle" font-weight="600">Windows · numpy-продюсер</text>
  <text x="133" y="386" fill="#7fc7a3" font-size="10" text-anchor="middle">сегодня · CPU</text>

  <rect x="28" y="402" width="210" height="42" rx="9" fill="#132a24" stroke="#3f9a6e"/>
  <text x="133" y="421" fill="#d7f2e4" font-size="11.5" text-anchor="middle" font-weight="600">Linux · C++/GPU rocFFT</text>
  <text x="133" y="436" fill="#7fc7a3" font-size="10" text-anchor="middle">завтра · GPU</text>

  <path d="M238,373 C270,373 272,392 298,394" stroke="#48d59a" fill="none" marker-end="url(#ahg)"/>
  <path d="M238,423 C270,423 272,400 298,398" stroke="#48d59a" fill="none" marker-end="url(#ahg)"/>
  <text x="250" y="352" fill="#8fb6c8" font-size="10.5">ZMQ PUB/SUB + MessagePack</text>

  <rect x="700" y="336" width="212" height="40" rx="9" fill="#122132" stroke="#3f6ea8"/>
  <text x="806" y="360" fill="#d7e4f6" font-size="11.5" text-anchor="middle" font-weight="600">Dear PyGui — live-квадраты</text>

  <rect x="700" y="384" width="212" height="40" rx="9" fill="#122132" stroke="#3f6ea8"/>
  <text x="806" y="408" fill="#d7e4f6" font-size="11.5" text-anchor="middle" font-weight="600">plotly — 3D-обзор</text>

  <rect x="700" y="432" width="212" height="40" rx="9" fill="#122132" stroke="#3f6ea8"/>
  <text x="806" y="456" fill="#d7e4f6" font-size="11.5" text-anchor="middle" font-weight="600">matplotlib — контрольные PNG</text>

  <path d="M640,388 C665,388 672,356 698,356" stroke="#4fb8d6" fill="none" marker-end="url(#ah)"/>
  <path d="M640,398 C668,398 672,404 698,404" stroke="#4fb8d6" fill="none" marker-end="url(#ah)"/>
  <path d="M640,408 C665,408 672,452 698,452" stroke="#4fb8d6" fill="none" marker-end="url(#ah)"/>
  <text x="648" y="336" fill="#8fb6c8" font-size="10.5">notify</text>

  <text x="28" y="500" fill="#6f93a4" font-size="11">Правило: визуальный код — Observer. Рендер срабатывает только ПОСЛЕ помещения данных в шину.</text>
  <text x="28" y="520" fill="#6f93a4" font-size="11">Панель, шина, конфиг и протокол — одни на обеих платформах; меняется только backend и источник данных.</text>

  <text x="28" y="560" fill="#8fb6c8" font-size="11.5" font-weight="700">ООП · SOLID · GRASP · GoF:</text>
  <text x="28" y="580" fill="#7fb0c4" font-size="10.8">Strategy (WaveformToCube/MotionModel/Transport) · Observer (шина↔визуал) · Value Object (config/куб) ·</text>
  <text x="28" y="598" fill="#7fb0c4" font-size="10.8">Facade+Repository (DataContext) · Composite (Scene) · Template Method (Fft3DModel) · Command (runtime) · DI (Composition Root)</text>
</svg>
